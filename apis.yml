apis:
  - aid: zluri:zluri
    name: Zluri
    humanURL: https://www.zluri.com/
    tags:
      - Access Management
      - FinOps
      - SaaS Management
    description: >-
      The Zluri external API enables organizations to push data from custom and
      on-premise applications into Zluri when no native connector is available.
      The API supports syncing users, applications, contracts, transactions,
      groups, roles, and activities. It follows a sync-based workflow where you
      create a sync session, upload data in paginated batches, and finish the
      sync to make data visible in Zluri.
